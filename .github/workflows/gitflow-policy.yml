name: GitFlow Policy Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: read

jobs:
  audit:
    name: Audit branch protection rules
    runs-on: ubuntu-latest
    steps:
      - name: Check required GitFlow branches are protected
        uses: actions/github-script@v9
        with:
          script: |
            const requiredBranches = ['main', 'develop'];
            for (const branch of requiredBranches) {
              try {
                const { data } = await github.rest.repos.getBranch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  branch,
                });
                if (!data.protected) {
                  core.setFailed([
                    `Branch ${branch} exists but is not protected.`,
                    'Apply .github/rulesets/gitflow-branch-protection.json.',
                  ].join(' '));
                } else {
                  core.info(`✅ ${branch} is protected`);
                }
              } catch (error) {
                if (error.status === 404 && branch === 'develop') {
                  core.warning([
                    'develop branch does not exist yet;',
                    'create/protect it before enabling full GitFlow.',
                  ].join(' '));
                } else {
                  throw error;
                }
              }
            }
