name: Publish Release to pub.dev

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - pubspec.yaml
      - CHANGELOG.md
      - lib/**
      - .github/workflows/publish-release.yml
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish. Must match pubspec.yaml when provided.
        required: false
        type: string
      dry_run:
        description: Validate only; do not publish or create a release.
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write
  pull-requests: read

concurrency:
  group: publish-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package and create GitHub release
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main')
      }}
    environment: pub-dev
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Run tests with coverage gate
        run: |
          flutter test --coverage
          dart run tool/coverage_gate.dart --lcov coverage/lcov.info --min-lines 100

      - name: Validate version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(awk '/^version:/ {print $2; exit}' pubspec.yaml)
          if [ -z "$VERSION" ]; then
            echo "::error::Unable to read version from pubspec.yaml"
            exit 1
          fi
          INPUT_VERSION="${{ inputs.version }}"
          if [ -n "$INPUT_VERSION" ] && [ "$INPUT_VERSION" != "$VERSION" ]; then
            echo "::error::workflow_dispatch version '$INPUT_VERSION' does not match pubspec.yaml '$VERSION'"
            exit 1
          fi
          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists. Bump pubspec.yaml before publishing."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Pub.dev dry run
        run: flutter pub publish --dry-run

      - name: Publish to pub.dev using trusted publishing
        if: ${{ inputs.dry_run != true }}
        env:
          PUB_ENVIRONMENT: github-actions
        run: dart pub publish --force

      - name: Create and push tag
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        if: ${{ inputs.dry_run != true }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: platform_serial ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: false

      - name: Publish summary
        if: always()
        run: |
          {
            echo "## 📦 Publish summary"
            echo "- Version: ${{ steps.version.outputs.version }}"
            echo "- Tag: ${{ steps.version.outputs.tag }}"
            echo "- Dry run: ${{ inputs.dry_run }}"
            echo "- pub.dev: https://pub.dev/packages/platform_serial"
          } >> "$GITHUB_STEP_SUMMARY"
