name: Publish Release to pub.dev

on:
  push:
    branches:
      - main
    paths:
      - 'pubspec.yaml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (optional, auto-detect if empty)'
        required: false

jobs:
  publish:
    name: Publish to pub.dev
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.10.0
          channel: stable

      - name: Resolve dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test test/unit/ test/integration/

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Setup pub.dev credentials from Google OAuth
        run: |
          mkdir -p ~/.pub-cache
          
          # Get OAuth2 access token from gcloud
          ACCESS_TOKEN=$(gcloud auth application-default print-access-token)
          
          # Create pub.dev credentials.json with OAuth2 token
          cat > ~/.pub-cache/credentials.json << EOF
          {
            "version": 1,
            "hosted": [
              {
                "url": "https://pub.dev",
                "credentialType": "oauth2",
                "clientId": "818368855108-8grd2eg9tj9f4o01905ktndnj4kolaba.apps.googleusercontent.com",
                "scopes": [
                  "openid",
                  "https://www.googleapis.com/auth/userinfo.email"
                ],
                "token": "$ACCESS_TOKEN"
              }
            ]
          }
          EOF
          
          chmod 600 ~/.pub-cache/credentials.json

      - name: Get version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep "^version:" pubspec.yaml | head -n 1 | cut -d' ' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          release_name: Release v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false

      - name: Publish to pub.dev
        run: |
          echo "Publishing platform_serial v${{ steps.version.outputs.version }} to pub.dev..."
          flutter pub publish --force
        env:
          PUB_ENVIRONMENT: "ci.github"

      - name: Comment on PR/Release with success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            const releaseUrl = 'https://pub.dev/packages/platform_serial/versions/' + version;
            github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'publish-success',
              client_payload: {
                version: version,
                url: releaseUrl
              }
            });
            console.log(`✅ Published version ${version} to pub.dev`);
            console.log(`📦 View at: ${releaseUrl}`);

      - name: Comment on PR/Release with failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            console.error(`❌ Failed to publish version ${version} to pub.dev`);
            console.error('Check workflow logs for details');


      - name: Comment on related PR
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Release Published!**\n\nVersion \`${version}\` has been successfully published to [pub.dev](https://pub.dev/packages/platform_serial).`
            });

      - name: Failure notification
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **Release Failed**\n\nFailed to publish version \`${version}\` to pub.dev. Check the workflow logs for details.`
            });
