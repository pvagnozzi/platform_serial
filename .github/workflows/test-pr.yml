name: Test on PR

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'lib/**'
      - 'test/**'
      - 'example/**'
      - 'android/**'
      - 'ios/**'
      - 'linux/**'
      - 'macos/**'
      - 'windows/**'
      - 'pubspec.yaml'
      - '.github/workflows/test-pr.yml'
  push:
    branches:
      - develop
    paths:
      - 'lib/**'
      - 'test/**'
      - 'example/**'
      - 'android/**'
      - 'ios/**'
      - 'linux/**'
      - 'macos/**'
      - 'windows/**'
      - 'pubspec.yaml'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.10.0
          channel: stable

      - name: Resolve dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.10.0
          channel: stable

      - name: Resolve dependencies
        run: flutter pub get

      - name: Run unit tests
        run: flutter test test/unit/

      - name: Run integration tests
        run: flutter test test/integration/

      - name: Run E2E tests
        run: flutter test test/e2e/

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: always()
        with:
          flags: unittests
          name: codecov-umbrella

  build-example:
    name: Build Example App
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.10.0
          channel: stable

      - name: Resolve example dependencies
        run: cd example && flutter pub get

      - name: Build example (web)
        run: cd example && flutter build web --release
        continue-on-error: true

  pr-status:
    name: PR Status Check
    runs-on: ubuntu-latest
    needs: [analyze, test, build-example]
    if: always()
    steps:
      - name: Check job statuses
        run: |
          if [ "${{ needs.analyze.result }}" != "success" ]; then
            echo "❌ Analyze failed"
            exit 1
          fi
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ Tests failed"
            exit 1
          fi
          if [ "${{ needs.build-example.result }}" != "success" ] && [ "${{ needs.build-example.result }}" != "skipped" ]; then
            echo "⚠️ Example build failed (non-blocking)"
          fi
          echo "✅ All checks passed"
