name: Continuous Quality Gate

on:
  pull_request:
    branches: [main, develop, dev]
  push:
    branches: [develop, dev]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze package and example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Resolve root dependencies
        run: flutter pub get

      - name: Resolve example dependencies
        run: flutter pub get
        working-directory: example

      - name: Analyze root package
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Analyze example package
        run: flutter analyze --fatal-infos --fatal-warnings
        working-directory: example

      - name: Validate pub.dev package metadata
        run: flutter pub publish --dry-run

  test:
    name: Tests and coverage
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Run all tests with coverage
        run: flutter test --coverage

      - name: Enforce 100% line coverage on coverage scope
        run: dart run tool/coverage_gate.dart --lcov coverage/lcov.info --min-lines 100

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lcov-report
          path: coverage/lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage/lcov.info
          flags: flutter
          name: platform-serial
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  example-smoke:
    name: Example smoke test
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Resolve example dependencies
        run: flutter pub get
        working-directory: example

      - name: Run example widget tests
        run: flutter test
        working-directory: example

      - name: Build Linux example when toolchain is available
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
          flutter config --enable-linux-desktop
          flutter build linux --debug
        working-directory: example

  pr-status:
    name: PR Status Check
    runs-on: ubuntu-latest
    needs: [analyze, test, example-smoke]
    if: always()
    steps:
      - name: Check job statuses
        run: |
          set -euo pipefail
          if [ "${{ needs.analyze.result }}" != "success" ]; then echo "❌ Analyze failed"; exit 1; fi
          if [ "${{ needs.test.result }}" != "success" ]; then echo "❌ Tests failed"; exit 1; fi
          if [ "${{ needs.example-smoke.result }}" != "success" ]; then echo "❌ Example smoke test failed"; exit 1; fi
          echo "✅ Continuous quality gate passed"
