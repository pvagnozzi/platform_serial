name: Bug report
description: Report a reproducible problem in platform_serial
title: "bug: "
labels: [bug, needs-triage]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [Windows, Linux, macOS, Android, iOS, Other]
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      render: markdown
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or errors
      render: text
