name: platform_serial
description: Cross-platform Flutter serial port plugin with streams, typed errors, native backends, and modem-control signals.

version: 0.1.2
homepage: https://github.com/pvagnozzi/platform_serial
repository: https://github.com/pvagnozzi/platform_serial
issue_tracker: https://github.com/pvagnozzi/platform_serial/issues
documentation: https://github.com/pvagnozzi/platform_serial/tree/dev/doc

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.0
  mocktail: ^1.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.xauron.platform_serial
        pluginClass: FlutterSerialPlugin
      ios:
        pluginClass: FlutterSerialPlugin
      linux:
        pluginClass: PlatformSerialPlugin
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
