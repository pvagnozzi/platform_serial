name: flutter_serial_monitor
description: >-
  Flutter Serial Monitor — professional serial terminal example
  for the platform_serial plugin.
publish_to: none

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  platform_serial:
    # platform_serial root is two levels up from
    # examples/flutter_serial_monitor/
    path: ../..   

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
