<!doctype html>
<html lang="en">
  <head>
    <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
    <base href="$FLUTTER_BASE_HREF" />

    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Platform Serial Terminal — Flutter serial communication example using the Web Serial API (Chrome/Edge 89+, HTTPS or localhost required)."
    />
    <meta name="theme-color" content="#1976D2" />

    <!-- iOS meta tags & icons -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Serial Terminal" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />

    <title>Platform Serial Terminal</title>
    <link rel="manifest" href="manifest.json" />
  </head>
  <body>
    <!--
    Web Serial API requirements:
    - Chrome or Edge 89+
    - HTTPS origin or http://localhost
    - User gesture required for navigator.serial.requestPort()

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/API/Web_Serial_API
    * https://wicg.github.io/serial/

    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
    <script src="flutter_bootstrap.js" async></script>
  </body>
</html>
